<!doctype html>
<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />

        <title>Babylon.js sample code</title>

        <!-- Babylon.js -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.6.2/dat.gui.min.js"></script>
        <script src="https://assets.babylonjs.com/generated/Assets.js"></script>
        <script src="https://cdn.babylonjs.com/recast.js"></script>
        <script src="https://cdn.babylonjs.com/ammo.js"></script>
        <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
        <script src="https://cdn.babylonjs.com/cannon.js"></script>
        <script src="https://cdn.babylonjs.com/Oimo.js"></script>
        <script src="https://cdn.babylonjs.com/earcut.min.js"></script>
        <script src="https://cdn.babylonjs.com/babylon.js"></script>
        <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
        <script src="https://cdn.babylonjs.com/proceduralTexturesLibrary/babylonjs.proceduralTextures.min.js"></script>
        <script src="https://cdn.babylonjs.com/postProcessesLibrary/babylonjs.postProcess.min.js"></script>
        <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.js"></script>
        <script src="https://cdn.babylonjs.com/serializers/babylonjs.serializers.min.js"></script>
        <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
        <script src="https://cdn.babylonjs.com/addons/babylonjs.addons.min.js"></script>
        <script src="https://cdn.babylonjs.com/inspector/babylon.inspector.bundle.js"></script>

        <style>
            html,
            body {
                overflow: hidden;
                width: 100%;
                height: 100%;
                margin: 0;
                padding: 0;
            }

            #renderCanvas {
                width: 100%;
                height: 100%;
                touch-action: none;
            }

            #canvasZone {
                width: 100%;
                height: 100%;
            }
        </style>
    </head>
    <body>
        <div id="canvasZone"><canvas id="renderCanvas"></canvas></div>
        <script>
                    var canvas = document.getElementById("renderCanvas");

                    var startRenderLoop = function (engine, canvas) {
                        engine.runRenderLoop(function () {
                            if (sceneToRender && sceneToRender.activeCamera) {
                                sceneToRender.render();
                            }
                        });
                    }

                    var engine = null;
        var scene = null;
        var sceneToRender = null;
        var createDefaultEngine = function() { return new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true,  disableWebGL2Support: false}); };
        var createScene = function () {
    // SETUP ###############################################
    // this is the same setup as the default Playground scene, but with a box instead of a sphere and an arc rotate camera instead of free camera

            // This creates a basic Babylon Scene object (non-mesh)
            var scene = new BABYLON.Scene(engine);

            // Using Arc rotate camera instead of free camera
            const camera = new BABYLON.ArcRotateCamera("camera1",-Math.PI/2, Math.PI/4, 12, new BABYLON.Vector3.Zero());

            // This targets the camera to scene origin
            camera.setTarget(BABYLON.Vector3.Zero());

            // This attaches the camera to the canvas
            camera.attachControl(canvas, true);

            // This creates a light, aiming 0,1,0 - to the sky (non-mesh)
            var light = new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0, 1, 0), scene);

            // Default intensity is 1. Let's dim the light a small amount
            light.intensity = 0.7;

            // This is the box we'll apply the animation to.
            let box = BABYLON.MeshBuilder.CreateBox('box', {width: 1, height: 1, depth: 1});

            // This second box is to deal with a bug that causes a freeze when only one mesh present in scene. I've made it very small so it can't be seen
            let box2 = BABYLON.MeshBuilder.CreateBox('box', {width: .001, height: .001, depth: .001});

            // KEYFRAMES ANIMATION 
            let frameRate = 30; // frames/second
            // reducing the framerate does NOT cause the animation to be less smooth or choppy as it would in After Effects or with a video - the framerate is more about setting the granularity of the animation timeline.

            // Create an animation object - an animation for the x position of the box 
            let boxPositionXAnimation = new BABYLON.Animation(
                'box-position-x-animation',
                'position.x', // property of the mesh to be animated, as a string
                frameRate, 
                BABYLON.Animation.ANIMATIONTYPE_FLOAT, // type of animation - often going to the float type
                BABYLON.Animation.ANIMATIONLOOPMODE_YOYO // type of looping - IF the animation loops, it uses this mode. The cycle mode cause s the animation to start back at the begining when it loops. 
            ); 
            // CHALLENGE: figure out how to have the animation loop by going back and forth (instead of restarting at the begining each time it loops) Hint: use Babylon's documentation and maybe Google 

            // Define the keyframes as an array - each keyframe is an object
            // set keyframes for animation that has the box move from left to right
            let boxPositionXKeyframes = [
                {
                    // keyframe object
                    value: -5,
                    frame: 0
                },
                {
                    value: 5,
                    frame: 1*frameRate // how many seconds is 30 frames? 1 second
                },
                {
                    value: 0,
                    frame: 2*frameRate
                }
            ];
            // CHALLENGE: after the box arrives on the right side of the environment, have it move to the middle and stop.

            // Add the keyframes to the animation object
            boxPositionXAnimation.setKeys(boxPositionXKeyframes);

            // Play the animation 
            scene.beginDirectAnimation(
                box, // mesh that recieves the animation
                [boxPositionXAnimation], // array of animations to apply - we can apply more than one at the same time
                0, // start frame of the animation with respect to the timeline of the animation itself, NOT the global timeline
                60, // end frame of the animation
                false, // whether the animation loops or not (using the cycle mode we set earlier)
                1, // speed of the animation playback. 1 is normal speed, bw 0 and 1 is slower, > 1 is faster
                function() {
                    // if we want to play another animation, we do it here.
                } // after the animation completes, this function is called. (Only if looping is set to false.) We can use this to play other animations AFTER the first animation has completed. This is one way to chain animations together.
            );

            let torus = BABYLON.MeshBuilder.CreateTorus('torus', {diameter: 2, thickness: 1, tessellation: 5});

            torus.position.y = 2;

            // Animate the rotation of the torus/pentagon 
            let torusRotationAnimation = new BABYLON.Animation(
                'torus-rotation-animation',
                'rotation', // animate all three rotation directions instead of just one
                frameRate,
                BABYLON.Animation.ANIMATIONTYPE_VECTOR3, // allows us to animate 3d vectors instead of individial properties
                BABYLON.Animation.ANIMATIONLOOPMODE_YOYO
            );

            let torusRotationDuration = 10; // duration of the animation in seconds

            let torusRotationKeyframes = [
                {
                    value: new BABYLON.Vector3(0, 0, 0),
                    frame: 0
                }, 
                {
                    value: new BABYLON.Vector3(2*Math.PI, 2*Math.PI ,0),
                    frame: torusRotationDuration*frameRate
                }
            ];
            torusRotationAnimation.setKeys(torusRotationKeyframes);
            scene.beginDirectAnimation(
                torus,
                [torusRotationAnimation],
                0,
                torusRotationDuration * frameRate,
                true,
                1,
                function() {}
            )

            // EASING - this controls how the speed of the animation varies between frames - (does the object always move the same speed, or does it slow and speed up, etc.)
            let easingFunction = new BABYLON.CubicEase(); // cubic ease is kind of like the Bezier-curve-based easing we did in After Effects
            easingFunction.setEasingMode(BABYLON.EasingFunction.EASINGMODE_EASEINOUT); // ease-in-out mode, we also used this with CSS keyframes - the animation starts slow, speed up in the middle, and end slow 

            boxPositionXAnimation.setEasingFunction(easingFunction);

                // BREAK 1:55pm
    return scene;
};
                window.initFunction = async function() {
                    
                    
                    
                    var asyncEngineCreation = async function() {
                        try {
                        return createDefaultEngine();
                        } catch(e) {
                        console.log("the available createEngine function failed. Creating the default engine instead");
                        return createDefaultEngine();
                        }
                    }

                    window.engine = await asyncEngineCreation();
                    
                    const engineOptions = window.engine.getCreationOptions?.();
                    if (!engineOptions || engineOptions.audioEngine !== false) {
                        
                    }
        if (!engine) throw 'engine should not be null.';
        startRenderLoop(engine, canvas);
        window.scene = createScene();};
        initFunction().then(() => {sceneToRender = scene
                    });

                    // Resize
                    window.addEventListener("resize", function () {
                        engine.resize();
                    });
        </script>
    </body>
</html>
